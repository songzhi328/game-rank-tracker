<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏排名追踪器</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      background: #f0f2f5;
      min-height: 100vh;
    }
    .navbar-brand i { font-size: 1.3rem; }
    .game-card {
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
      border: 2px solid transparent;
    }
    .game-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .game-card.active {
      border-color: #0d6efd;
      background: #f0f5ff;
    }
    .rank-badge {
      font-size: .75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .rank-badge.free   { background: #d1ecf1; color: #0c5460; }
    .rank-badge.gross  { background: #ffeeba; color: #856404; }
    .rank-badge.paid   { background: #f8d7da; color: #721c24; }
    .rank-badge.none   { background: #e2e3e5; color: #41464b; }
    #chartContainer {
      position: relative;
      min-height: 340px;
    }
    .spinner-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.75);
      z-index: 10;
    }
    #lastCheckedBadge { font-size: .8rem; }
    .region-select { min-width: 120px; }
    .store-tab {
      cursor: pointer;
      font-size: .85rem;
    }
    .store-tab.active {
      font-weight: 600;
      border-bottom: 2px solid #0d6efd;
    }
    .region-id-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      padding: 2px 0;
    }
    .region-id-row .region-code {
      min-width: 30px;
      font-weight: 600;
      color: #6c757d;
    }
    .region-id-row .region-appid {
      color: #495057;
      font-family: monospace;
      font-size: .7rem;
    }
    .region-id-row .diff-badge {
      font-size: .6rem;
      padding: 0 4px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand mb-0 h1">
      <i class="bi bi-graph-up-arrow me-2"></i>游戏排名追踪器
    </span>
    <div class="d-flex align-items-center gap-3">
      <!-- Store tabs -->
      <div class="btn-group btn-group-sm" role="group">
        <button id="storeIos" class="btn btn-outline-light store-tab active" data-store="ios">
          <i class="bi bi-phone me-1"></i>iOS
        </button>
        <button id="storeGoogle" class="btn btn-outline-light store-tab" data-store="google">
          <i class="bi bi-android2 me-1"></i>Google Play
        </button>
      </div>
      <select id="regionSelect" class="form-select form-select-sm region-select">
        <!-- Populated dynamically -->
      </select>
      <span id="lastCheckedBadge" class="badge bg-light text-dark">
        <i class="bi bi-clock me-1"></i>加载中…
      </span>
      <span id="storeWarning" class="badge bg-warning text-dark d-none">
        <i class="bi bi-exclamation-triangle me-1"></i><span id="storeWarningText"></span>
      </span>
      <button id="btnFetchNow" class="btn btn-warning btn-sm fw-semibold">
        <i class="bi bi-arrow-clockwise me-1"></i>立即查询
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">
  <div class="row g-3">

    <!-- Left column: game list -->
    <div class="col-lg-4 col-xl-3">

      <!-- Add game form -->
      <div class="card shadow-sm mb-3">
        <div class="card-header fw-semibold">
          <i class="bi bi-plus-circle me-1"></i>添加游戏
        </div>
        <div class="card-body">
          <div class="mb-2">
            <input id="inputName" type="text" class="form-control form-control-sm"
                   placeholder="游戏名称" />
          </div>
          <div class="mb-2">
            <input id="inputAppId" type="text" class="form-control form-control-sm"
                   placeholder="iOS App ID（如 1528917194）" />
          </div>
          <div class="mb-2">
            <input id="inputGoogleAppId" type="text" class="form-control form-control-sm"
                   placeholder="Google Play 包名（如 com.xxx.game）" />
          </div>
          <button id="btnAddGame" class="btn btn-primary btn-sm w-100">
            <i class="bi bi-plus me-1"></i>添加
          </button>
          <div id="addGameError" class="text-danger small mt-1 d-none"></div>
        </div>
      </div>

      <!-- Game list -->
      <div class="card shadow-sm">
        <div class="card-header fw-semibold d-flex justify-content-between align-items-center">
          <span><i class="bi bi-controller me-1"></i>已追踪游戏</span>
          <span id="gameCount" class="badge bg-secondary">0</span>
        </div>
        <div id="gameList" class="list-group list-group-flush">
          <div class="list-group-item text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm me-2"></div>加载中…
          </div>
        </div>
      </div>
    </div>

    <!-- Right column: chart -->
    <div class="col-lg-8 col-xl-9">
      <div class="card shadow-sm h-100">
        <div class="card-header fw-semibold d-flex align-items-center gap-2">
          <i class="bi bi-bar-chart-line me-1"></i>
          <span id="chartTitle">排名趋势</span>
        </div>
        <div class="card-body">
          <div id="chartContainer">
            <div id="chartPlaceholder" class="d-flex align-items-center justify-content-center h-100 text-muted" style="min-height:300px;">
              <div class="text-center">
                <i class="bi bi-bar-chart-line display-4 d-block mb-2"></i>
                请在左侧选择一款游戏查看排名趋势
              </div>
            </div>
            <div id="spinnerOverlay" class="spinner-overlay d-none">
              <div class="spinner-border text-primary"></div>
            </div>
            <canvas id="rankChart" style="display:none;"></canvas>
          </div>

          <!-- Legend note -->
          <div id="chartLegend" class="mt-3 d-none small text-muted">
            <span class="me-3"><span style="display:inline-block;width:14px;height:14px;background:#0d6efd;border-radius:3px;vertical-align:middle;"></span> 免费榜排名</span>
            <span class="me-3"><span style="display:inline-block;width:14px;height:14px;background:#ffc107;border-radius:3px;vertical-align:middle;"></span> 畅销榜排名</span>
            <span><span style="display:inline-block;width:14px;height:14px;background:#dc3545;border-radius:3px;vertical-align:middle;"></span> 付费榜排名</span>
            <span class="ms-3 fst-italic">（排名越小越靠前；-1 表示未上榜）</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Region ID edit modal -->
<div class="modal fade" id="regionIdModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title"><i class="bi bi-globe me-1"></i>编辑地区 App ID</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        <p class="text-muted mb-2">同一游戏在不同地区的 App Store ID 可能不同。留空则使用默认 ID。</p>
        <div id="regionIdFields"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
        <button id="btnSaveRegionIds" class="btn btn-sm btn-primary">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Google App ID edit modal -->
<div class="modal fade" id="googleAppIdModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title"><i class="bi bi-android2 me-1"></i>编辑 Google Play 包名</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        <label class="form-label">Google Play 包名</label>
        <input id="inputGooglePkg" type="text" class="form-control form-control-sm"
               placeholder="com.example.app" />
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
        <button id="btnSaveGooglePkg" class="btn btn-sm btn-primary">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">确认删除</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small">
        确定要删除 <strong id="deleteGameName"></strong> 吗？所有历史数据将一并删除。
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">取消</button>
        <button id="btnConfirmDelete" class="btn btn-sm btn-danger">删除</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<script>
/* ===================================================================
   Game Rank Tracker — Frontend Logic (Multi-Store + Multi-Region)
   =================================================================== */

const API = {
  games:       (region, store) => `/api/games?region=${region}&store=${store}`,
  rankings:    (id, region, store) => `/api/rankings/${id}?region=${region}&store=${store}`,
  fetchNow:    '/api/fetch-now',
  status:      (store) => `/api/status?store=${store}`,
  regions:     (store) => `/api/regions?store=${store}`,
  stores:      '/api/stores',
  regionIds:   (id) => `/api/games/${id}/region-ids`,
  googleAppId: (id) => `/api/games/${id}/google-app-id`,
};

const REGION_NAMES = {cn:'中国',us:'美国',gb:'英国',jp:'日本',kr:'韩国',sg:'新加坡',th:'泰国',de:'德国',fr:'法国',hk:'香港',mo:'澳门',tw:'台湾'};

let allGames       = [];
let selectedGameId = null;
let deleteTargetId = null;
let rankChart      = null;
let currentRegion  = 'cn';
let currentStore   = 'ios';
let googleModalGameId = null;

const deleteModal  = new bootstrap.Modal(document.getElementById('deleteModal'));
const regionIdModal = new bootstrap.Modal(document.getElementById('regionIdModal'));
const googleAppIdModal = new bootstrap.Modal(document.getElementById('googleAppIdModal'));

// ---- Utility --------------------------------------------------------

function rankDisplay(rank) {
  if (rank === null || rank === undefined) return '—';
  return rank === -1 ? '未上榜' : `#${rank}`;
}

function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 end-0 m-3`;
  el.style.zIndex = 9999;
  el.innerHTML = `${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Store tabs -----------------------------------------------------

function switchStore(store) {
  currentStore = store;
  document.querySelectorAll('.store-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.store === store);
  });
  loadRegions(store);
  loadGames();
  loadStatus(store);
  if (selectedGameId) {
    selectGame(selectedGameId);
  }

  // Show warning for Google Play when no proxy is configured
  const warning = document.getElementById('storeWarning');
  const warningText = document.getElementById('storeWarningText');
  if (store === 'google') {
    warningText.textContent = 'Google Play 数据需要配置 HTTPS_PROXY';
    warning.classList.remove('d-none');
  } else {
    warning.classList.add('d-none');
  }
}

document.getElementById('storeIos').addEventListener('click', () => switchStore('ios'));
document.getElementById('storeGoogle').addEventListener('click', () => switchStore('google'));

// ---- Region selector ------------------------------------------------

async function loadRegions(store) {
  try {
    const res  = await fetch(API.regions(store));
    const data = await res.json();
    if (data.success) {
      const select = document.getElementById('regionSelect');
      select.innerHTML = data.regions.map(r =>
        `<option value="${r.code}" ${r.code === currentRegion ? 'selected' : ''}>${r.name} (${r.code.toUpperCase()})</option>`
      ).join('');
    }
  } catch (e) {
    console.error('Failed to load regions', e);
  }
}

document.getElementById('regionSelect').addEventListener('change', async (e) => {
  currentRegion = e.target.value;
  await loadGames();
  if (selectedGameId) {
    await selectGame(selectedGameId);
  }
});

// ---- Status bar -----------------------------------------------------

async function loadStatus(store) {
  try {
    const res  = await fetch(API.status(store));
    const data = await res.json();
    const badge = document.getElementById('lastCheckedBadge');
    const regionInfo = (data.regions || {})[currentRegion];
    const lastTime = regionInfo?.last_checked || data.last_checked;
    if (lastTime) {
      badge.innerHTML = `<i class="bi bi-clock me-1"></i>最后查询：${lastTime}`;
    } else {
      badge.innerHTML = `<i class="bi bi-clock me-1"></i>尚未查询`;
    }
  } catch (e) {
    console.error('Failed to load status', e);
  }
}

// ---- Game list ------------------------------------------------------

function renderGameList() {
  const container = document.getElementById('gameList');
  document.getElementById('gameCount').textContent = allGames.length;

  if (allGames.length === 0) {
    container.innerHTML = `
      <div class="list-group-item text-center text-muted py-3 small">
        暂无追踪游戏，请在上方添加
      </div>`;
    return;
  }

  container.innerHTML = allGames.map(g => {
    const isActive = g.id === selectedGameId ? 'active' : '';

    // Show different rank badges depending on store
    let rankBadges = '';
    if (currentStore === 'google') {
      const freeRank = rankDisplay(g.latest_free);
      const paidRank = rankDisplay(g.latest_paid);
      const freeClass = (g.latest_free && g.latest_free !== -1) ? 'free' : 'none';
      const paidClass = (g.latest_paid && g.latest_paid !== -1) ? 'paid' : 'none';
      rankBadges = `
        <span class="rank-badge ${freeClass}">免费 ${freeRank}</span>
        <span class="rank-badge ${paidClass}">付费 ${paidRank}</span>`;
    } else {
      const freeRank = rankDisplay(g.latest_free);
      const grossRank = rankDisplay(g.latest_grossing);
      const freeClass = (g.latest_free && g.latest_free !== -1) ? 'free' : 'none';
      const grossClass = (g.latest_grossing && g.latest_grossing !== -1) ? 'gross' : 'none';
      rankBadges = `
        <span class="rank-badge ${freeClass}">免费 ${freeRank}</span>
        <span class="rank-badge ${grossClass}">畅销 ${grossRank}</span>`;
    }

    // Region ID summary (iOS only)
    const regionIds = g.region_ids || {};
    const regionIdRows = Object.entries(REGION_NAMES).map(([code, name]) => {
      const rid = regionIds[code] || '';
      const isDefault = rid === g.app_id;
      return `
        <div class="region-id-row">
          <span class="region-code">${code.toUpperCase()}</span>
          <span class="region-appid">${rid ? escHtml(rid) : '<span class="text-muted">默认</span>'}</span>
          ${!isDefault && rid ? '<span class="diff-badge badge bg-info text-dark">不同</span>' : ''}
        </div>`;
    }).join('');

    const hasGoogleId = g.google_app_id && g.google_app_id !== '';

    return `
      <div class="list-group-item list-group-item-action game-card p-2 ${isActive}"
           data-id="${g.id}" onclick="selectGame(${g.id})">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <div class="fw-semibold small">${escHtml(g.name)}</div>
            <div class="text-muted" style="font-size:.7rem;">
              ${currentStore === 'google' && hasGoogleId
                ? `GP: ${escHtml(g.google_app_id)}`
                : `ID: ${escHtml(g.app_id)}`}
            </div>
          </div>
          <div class="d-flex gap-1">
            <button class="btn btn-link btn-sm p-0 text-success"
                    onclick="editGoogleAppId(event, ${g.id}, '${escHtml(g.name).replace(/'/g,"\\'")}')"
                    title="编辑 Google Play 包名">
              <i class="bi bi-android2"></i>
            </button>
            <button class="btn btn-link btn-sm p-0 text-primary"
                    onclick="editRegionIds(event, ${g.id})" title="编辑地区ID">
              <i class="bi bi-globe"></i>
            </button>
            <button class="btn btn-link btn-sm p-0 text-danger"
                    onclick="confirmDelete(event, ${g.id}, '${escHtml(g.name).replace(/'/g,"\\'")}')">
              <i class="bi bi-trash3"></i>
            </button>
          </div>
        </div>
        <div class="mt-1 d-flex gap-1">
          ${rankBadges}
        </div>
        <div class="mt-1 border-top pt-1">
          ${regionIdRows}
        </div>
      </div>`;
  }).join('');
}

async function loadGames() {
  try {
    const res  = await fetch(API.games(currentRegion, currentStore));
    const data = await res.json();
    if (data.success) {
      allGames = data.games;
      renderGameList();
    }
  } catch (e) {
    showToast('加载游戏列表失败', 'danger');
  }
}

// ---- Add game -------------------------------------------------------

document.getElementById('btnAddGame').addEventListener('click', async () => {
  const name  = document.getElementById('inputName').value.trim();
  const appId = document.getElementById('inputAppId').value.trim();
  const googleAppId = document.getElementById('inputGoogleAppId').value.trim();
  const errEl = document.getElementById('addGameError');
  errEl.classList.add('d-none');

  if (!name || !appId) {
    errEl.textContent = '名称和 iOS App ID 均不能为空';
    errEl.classList.remove('d-none');
    return;
  }

  try {
    const res  = await fetch('/api/games', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, app_id: appId, google_app_id: googleAppId }),
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('inputName').value  = '';
      document.getElementById('inputAppId').value = '';
      document.getElementById('inputGoogleAppId').value = '';
      showToast(`游戏「${name}」已添加`);
      await loadGames();
    } else {
      errEl.textContent = data.error || '添加失败';
      errEl.classList.remove('d-none');
    }
  } catch (e) {
    errEl.textContent = '网络错误，请重试';
    errEl.classList.remove('d-none');
  }
});

// ---- Delete game ----------------------------------------------------

function confirmDelete(event, gameId, gameName) {
  event.stopPropagation();
  deleteTargetId = gameId;
  document.getElementById('deleteGameName').textContent = gameName;
  deleteModal.show();
}

document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
  if (!deleteTargetId) return;
  deleteModal.hide();

  try {
    const res  = await fetch(`/api/games/${deleteTargetId}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      if (selectedGameId === deleteTargetId) {
        selectedGameId = null;
        resetChart();
      }
      deleteTargetId = null;
      showToast('游戏已删除');
      await loadGames();
    } else {
      showToast(data.error || '删除失败', 'danger');
    }
  } catch (e) {
    showToast('网络错误，请重试', 'danger');
  }
});

// ---- Google App ID editing -------------------------------------------

function editGoogleAppId(event, gameId, gameName) {
  event.stopPropagation();
  googleModalGameId = gameId;
  const game = allGames.find(g => g.id === gameId);
  if (!game) return;
  document.getElementById('inputGooglePkg').value = game.google_app_id || '';
  googleAppIdModal.show();
}

document.getElementById('btnSaveGooglePkg').addEventListener('click', async () => {
  if (!googleModalGameId) return;
  const pkg = document.getElementById('inputGooglePkg').value.trim();
  if (!pkg) { showToast('包名不能为空', 'danger'); return; }
  try {
    const res  = await fetch(API.googleAppId(googleModalGameId), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ google_app_id: pkg }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('Google Play 包名已保存');
      googleAppIdModal.hide();
      await loadGames();
    } else {
      showToast(data.error || '保存失败', 'danger');
    }
  } catch (e) {
    showToast('网络错误，请重试', 'danger');
  }
});

// ---- Region ID editing -----------------------------------------------

function editRegionIds(event, gameId) {
  event.stopPropagation();
  const game = allGames.find(g => g.id === gameId);
  if (!game) return;

  const regionIds = game.region_ids || {};
  const container = document.getElementById('regionIdFields');

  container.innerHTML = Object.entries(REGION_NAMES).map(([code, name]) => {
    const val = regionIds[code] || '';
    return `
      <div class="mb-2 d-flex align-items-center gap-2">
        <label class="form-label mb-0" style="min-width:80px;">${name} (${code.toUpperCase()})</label>
        <input type="text" class="form-control form-control-sm region-id-input"
               data-region="${code}" value="${escHtml(val)}"
               placeholder="默认: ${escHtml(game.app_id)}" />
      </div>`;
  }).join('');

  document.getElementById('btnSaveRegionIds').onclick = async () => {
    const inputs = container.querySelectorAll('.region-id-input');
    const newRegionIds = {};
    inputs.forEach(inp => {
      newRegionIds[inp.dataset.region] = inp.value.trim();
    });

    try {
      const res  = await fetch(API.regionIds(gameId), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ region_ids: newRegionIds }),
      });
      const data = await res.json();
      if (data.success) {
        showToast('地区 ID 已保存');
        regionIdModal.hide();
        await loadGames();
      } else {
        showToast(data.error || '保存失败', 'danger');
      }
    } catch (e) {
      showToast('网络错误，请重试', 'danger');
    }
  };

  regionIdModal.show();
}

// ---- Chart ----------------------------------------------------------

function resetChart() {
  document.getElementById('chartPlaceholder').classList.remove('d-none');
  document.getElementById('rankChart').style.display = 'none';
  document.getElementById('chartLegend').classList.add('d-none');
  document.getElementById('chartTitle').textContent = '排名趋势';
  if (rankChart) { rankChart.destroy(); rankChart = null; }
}

async function selectGame(gameId) {
  selectedGameId = gameId;
  renderGameList();

  const game = allGames.find(g => g.id === gameId);
  const regionName = document.getElementById('regionSelect').selectedOptions[0]?.text || currentRegion;
  const storeLabel = currentStore === 'google' ? 'Google Play' : 'iOS';
  document.getElementById('chartTitle').textContent =
    game ? `${game.name} — ${regionName} ${storeLabel}排名趋势` : '排名趋势';

  document.getElementById('chartPlaceholder').classList.add('d-none');
  document.getElementById('spinnerOverlay').classList.remove('d-none');
  document.getElementById('rankChart').style.display = 'none';

  try {
    const res  = await fetch(API.rankings(gameId, currentRegion, currentStore) + '&limit=30');
    const data = await res.json();

    document.getElementById('spinnerOverlay').classList.add('d-none');

    if (!data.success) {
      showToast('加载排名数据失败', 'danger');
      return;
    }

    // Collect available chart types (varies by store)
    const datasets = [];
    const colorMap = {
      free: { label: '免费榜', color: '#0d6efd', bg: 'rgba(13,110,253,.1)' },
      grossing: { label: '畅销榜', color: '#ffc107', bg: 'rgba(255,193,7,.1)' },
      paid: { label: '付费榜', color: '#dc3545', bg: 'rgba(220,53,69,.1)' },
    };

    // Build unified label set
    const labelSet = new Set();
    for (const [type, records] of Object.entries(data.rankings)) {
      if (records && records.length) {
        records.forEach(r => labelSet.add(r.checked_at));
      }
    }
    const labels = Array.from(labelSet).sort();
    if (labels.length === 0) {
      document.getElementById('chartPlaceholder').classList.remove('d-none');
      document.getElementById('chartPlaceholder').innerHTML = `
        <div class="text-center">
          <i class="bi bi-bar-chart-line display-4 d-block mb-2"></i>
          暂无排名数据
        </div>`;
      return;
    }

    for (const [type, meta] of Object.entries(colorMap)) {
      const records = data.rankings[type] || [];
      if (records.length === 0) continue;
      const valueMap = Object.fromEntries(records.map(r => [r.checked_at, r.rank]));
      const points = labels.map(l => valueMap[l] === -1 ? null : (valueMap[l] ?? null));
      datasets.push({
        label: meta.label,
        data: points,
        borderColor: meta.color,
        backgroundColor: meta.bg,
        tension: 0.3,
        fill: true,
        pointRadius: 4,
        spanGaps: false,
      });
    }

    const shortLabels = labels.map(l => {
      const d = new Date(l);
      return isNaN(d.getTime())
        ? l
        : `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    });

    renderChart(shortLabels, datasets);
  } catch (e) {
    document.getElementById('spinnerOverlay').classList.add('d-none');
    showToast('加载排名数据失败', 'danger');
  }
}

function renderChart(labels, datasets) {
  if (rankChart) { rankChart.destroy(); rankChart = null; }

  const canvas = document.getElementById('rankChart');
  canvas.style.display = 'block';
  document.getElementById('chartLegend').classList.remove('d-none');
  document.getElementById('chartPlaceholder').classList.add('d-none');

  rankChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top' },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const val = ctx.raw;
              if (val === null || val === undefined) return `${ctx.dataset.label}: 未上榜`;
              return `${ctx.dataset.label}: #${val}`;
            },
          },
        },
      },
      scales: {
        y: {
          reverse: true,
          beginAtZero: false,
          title: { display: true, text: '排名（越小越靠前）' },
          ticks: {
            callback: (val) => `#${val}`,
          },
        },
        x: {
          title: { display: true, text: '查询时间' },
          ticks: { maxRotation: 45, minRotation: 30 },
        },
      },
    },
  });

  canvas.style.height = '320px';
}

// ---- Fetch now ------------------------------------------------------

document.getElementById('btnFetchNow').addEventListener('click', async () => {
  const btn = document.getElementById('btnFetchNow');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>查询中…';

  try {
    const res  = await fetch(API.fetchNow, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      showToast('查询完成！已更新所有商店排名数据');
      await loadGames();
      await loadStatus(currentStore);
      if (selectedGameId) { await selectGame(selectedGameId); }
    } else {
      showToast(data.error || '查询失败', 'danger');
    }
  } catch (e) {
    showToast('网络错误，请重试', 'danger');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>立即查询';
  }
});

// ---- Init -----------------------------------------------------------

(async () => {
  await loadRegions('ios');
  await loadRegions('google');
  await Promise.all([loadGames(), loadStatus('ios')]);
})();
</script>
